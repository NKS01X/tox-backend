version: "3.9"

services:

  # ── Redis (Streams + Pub/Sub) ───────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Go Application ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://postgres.znnerqhgwirwrhjipdyd:[YOUR-PASSWORD]@aws-0-us-east-1.pooler.supabase.com:6543/postgres"
      REDIS_ADDR: "redis:6379"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redisdata:
